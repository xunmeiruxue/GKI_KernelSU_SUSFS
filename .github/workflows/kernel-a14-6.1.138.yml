name: 内核构建 - Android 14 (6.1.138)

# 适配 Node.js 24 运行环境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 赋予工作流写入内容与管理 GitHub Actions 的权限
permissions:
  contents: write
  actions: write

# 并发控制：同一分支只运行一个实例，新运行会取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 触发条件：仅手动触发，无需填写任何参数即可一键构建
on:
  workflow_dispatch:

jobs:
  # ==================== 构建 Android 14 - 6.1.138 内核 ====================
  # 参数固定为日志中成功构建时使用的取值，直接调用项目核心构建流 build.yml
  build-kernel-a14-6-1-138:
    name: "6.1.138-android14-2025-06-ReSukiSU"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      # 锁定为 Android 14 6.1.138，对应安全补丁日期 2025-06
      android_version: "android14"
      kernel_version: "6.1"
      sub_level: "138"
      os_patch_level: "2025-06"

      # KernelSU 变体固定为 ReSukiSU，分支为 main
      ksu_variant: "ReSukiSU"
      ksu_branch: "main"

      # 版本名留空使用默认；构建时间沿用日志中的成功参数
      version: ""
      build_time: "Sun Dec 01 08:10:00 UTC 2024"

      # 功能开关：默认全部关闭，与日志一致
      use_zram: false
      use_bbg: false
      use_rekernel: false

      # 启用 SUSFS（enable_susfs=true，即日志中 cancel_susfs=false 的对应）
      enable_susfs: true
      # 不启用一加 8E 支持
      supp_op: false

      # Droidspaces 容器支持：使用 678 槽位（日志中的取值），不启用 NTSync
      droidspaces: "678"
      droidspaces_ntsync: false

  # ==================== 获取 KSU 管理器 APK 任务 ====================
  # 构建完成后获取最新的配套管理器 APK 并与内核一同归档
  get-ksu-manager:
    needs: build-kernel-a14-6-1-138
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
